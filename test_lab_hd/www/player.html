<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - Antigravity VMS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            position: absolute;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: #333;
            padding: 8px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .quality-btn {
            background: #444;
            color: #ddd;
            border: 1px solid #555;
            transition: all 0.2s;
            min-width: 80px;
            justify-content: center;
        }

        /* Cores por Nível */
        .q-sd {
            border-color: #555;
            color: #aaa;
        }

        .q-hd {
            border-color: #26a69a;
            color: #26a69a;
            background: rgba(38, 166, 154, 0.1);
        }

        .q-uhd {
            border-color: #7c4dff;
            color: #7c4dff;
            background: rgba(124, 77, 255, 0.1);
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #status-log {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="dashboard.html" class="back-btn">⬅ Voltar</a>
        <div class="actions">
            <!-- Quality Cycle Button -->
            <button id="btn-quality" onclick="cycleQuality()" class="back-btn quality-btn q-sd">SD</button>
            <button onclick="document.getElementById('mjpeg-stream').requestFullscreen()" class="back-btn">⛶
                Full</button>
        </div>
    </div>

    <!-- MJPEG Player -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100%; background: #000;">
        <img id="mjpeg-stream" style="max-width: 100%; max-height: 100%; object-fit: contain;"
            alt="Carregando Video...">
    </div>

    <div id="status-log">Modo: Carregando...</div>

    <script>
        // Auth Check
        if (sessionStorage.getItem('vms_auth') !== 'true') {
            window.location.href = 'index.html';
        }

        const img = document.getElementById('mjpeg-stream');
        const statusLog = document.getElementById('status-log');
        const btnQuality = document.getElementById('btn-quality');
        const urlParams = new URLSearchParams(window.location.search);

        // Base Logic
        // Keys: {name}_mjpeg -> {name}_hd -> {name}_uhd
        let currentKey = urlParams.get('src');
        // Initial Level Detection
        let currentLevel = 'sd'; // sd, hd, uhd
        if (currentKey.endsWith('_uhd')) currentLevel = 'uhd';
        else if (currentKey.endsWith('_hd')) currentLevel = 'hd';
        else currentLevel = 'sd'; // default '_mjpeg'

        updateBtnUI();

        // Direct Connection Logic (Test Lab Port 1985)
        const BASE_HOST = `http://${window.location.hostname}:1985`;

        function updateBtnUI() {
            btnQuality.className = 'back-btn quality-btn';

            // Logic: Button shows DESTINATION (Next Step)
            if (currentLevel === 'sd') {
                // Currently SD, Next is HD
                btnQuality.innerText = "Ir para HD 720p";
                btnQuality.classList.add('q-sd'); // Estilo neutro (ou style do proximo?)
                // Vamo usar o estilo do DESTINO p/ user saber o que vai ganhar
                btnQuality.classList.remove('q-sd');
                btnQuality.classList.add('q-hd');
            } else if (currentLevel === 'hd') {
                // Currently HD, Next is UHD
                btnQuality.innerText = "Ir para UHD 1080p";
                btnQuality.classList.remove('q-hd');
                btnQuality.classList.add('q-uhd');
            } else if (currentLevel === 'uhd') {
                // Currently UHD, Next is SD
                btnQuality.innerText = "Voltar p/ SD 360p";
                btnQuality.classList.remove('q-uhd');
                btnQuality.classList.add('q-sd');
            }
        }

        function loadStream(key) {
            statusLog.innerText = `Conectando a: ${key}...`;
            img.src = "";

            const streamUrl = `${BASE_HOST}/api/stream.mjpeg?src=${encodeURIComponent(key)}`;
            console.log("Switching to:", streamUrl);

            setTimeout(() => {
                img.src = streamUrl;
            }, 50);

            // Update URL
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('src', key);
            window.history.pushState({}, '', newUrl);
        }

        function cycleQuality() {
            if (!currentKey) return;

            let baseName = currentKey;
            // Strip suffix
            if (baseName.endsWith('_mjpeg')) baseName = baseName.replace('_mjpeg', '');
            else if (baseName.endsWith('_hd')) baseName = baseName.replace('_hd', '');
            else if (baseName.endsWith('_uhd')) baseName = baseName.replace('_uhd', '');

            // Cycle: SD -> HD -> UHD -> SD
            let newSuffix = '';

            if (currentLevel === 'sd') {
                currentLevel = 'hd';
                newSuffix = '_hd';
            } else if (currentLevel === 'hd') {
                currentLevel = 'uhd';
                newSuffix = '_uhd';
            } else {
                currentLevel = 'sd';
                newSuffix = '_mjpeg';
            }

            let newKey = baseName + newSuffix;
            currentKey = newKey;

            updateBtnUI();
            loadStream(newKey);
        }

        // Event Handlers
        img.onload = () => {
            let label = "";
            if (currentLevel === 'sd') label = "Resolução Baixa (Rápido)";
            if (currentLevel === 'hd') label = "Alta Definição (720p)";
            if (currentLevel === 'uhd') label = "Ultra Definição (1080p)";
            statusLog.innerText = `Status: ONLINE (${label})`;
            statusLog.style.color = "#0f0";
        };

        img.onerror = () => {
            statusLog.innerText = "Falha no Stream (Tentando reconectar...)";
            statusLog.style.color = "orange";
        };

        // Init
        setTimeout(() => {
            if (!currentKey) {
                statusLog.innerText = "Erro: Nenhuma câmera selecionada.";
                statusLog.style.color = "red";
            } else {
                loadStream(currentKey);
            }
        }, 500);

    </script>
</body>

</html>
