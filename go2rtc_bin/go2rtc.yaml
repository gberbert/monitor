log:
  level: info
  api: debug
  rtsp: warn
  streams: error

ffmpeg:
  bin: "ffmpeg"

api:
  listen: ":1984"
  origin: "*"
  static: "www"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  # --- PISCINA ---
  piscina_src: rtsp://berbert:viguera2001@192.168.3.14:554/cam/realmonitor?channel=1&subtype=0
  piscina: ffmpeg:piscina_src#video=h264#vf=scale=1280:720
  # Lê do SRC local (localhost:8554) para não abrir outra conexão na câmera
  piscina_mjpeg: exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://127.0.0.1:8554/piscina_src" -vf "scale=640:360" -r 8 -c:v mjpeg -an -f mjpeg -

  # --- RUA (Full Source) ---
  rua_src: rtsp://berbert:viguera2001@192.168.3.18:554/cam/realmonitor?channel=1&subtype=0
  
  # Rua Cima (Consome rua_src)
  rua: ffmpeg:rua_src#video=h264#vf=crop=in_w:in_h/2:0:0,scale=1280:720
  rua_mjpeg: exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://127.0.0.1:8554/rua_src" -vf "crop=in_w:in_h/2:0:0,scale=640:360" -r 8 -c:v mjpeg -an -f mjpeg -

  # Rua Baixo (Consome rua_src TAMBÉM - Economia de Conexão)
  rua_base: ffmpeg:rua_src#video=h264#vf=crop=in_w:in_h/2:0:in_h/2,scale=1280:720
  rua_base_mjpeg: exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://127.0.0.1:8554/rua_src" -vf "crop=in_w:in_h/2:0:in_h/2,scale=640:360" -r 8 -c:v mjpeg -an -f mjpeg -

  # --- VARANDA (Full Source) ---
  varanda_src: rtsp://berbert:viguera2001@192.168.3.37:554/cam/realmonitor?channel=1&subtype=1
  
  # Varanda Cima
  varanda: ffmpeg:varanda_src#video=h264#vf=crop=in_w:in_h/2:0:0,scale=1280:720
  varanda_mjpeg: exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://127.0.0.1:8554/varanda_src" -vf "crop=in_w:in_h/2:0:0,scale=640:360" -r 8 -c:v mjpeg -an -f mjpeg -

  # Varanda Baixo (Consome varanda_src TAMBÉM)
  varanda_base: ffmpeg:varanda_src#video=h264#vf=crop=in_w:in_h/2:0:in_h/2,scale=1280:720
  varanda_base_mjpeg: exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://127.0.0.1:8554/varanda_src" -vf "crop=in_w:in_h/2:0:in_h/2,scale=640:360" -r 8 -c:v mjpeg -an -f mjpeg -
