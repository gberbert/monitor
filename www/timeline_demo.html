<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVR Timeline Demo</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 5px 15px;
            background: #222;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #4CAF50;
        }

        .viewport {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            height: 180px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .timeline-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .time-labels {
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ccc;
            background: #222;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
        }

        .btn {
            background: #333;
            border: none;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn:hover {
            background: #444;
        }

        .btn-live {
            background: #d32f2f;
        }

        /* Mobile & Responsive Fixes */
        @media (max-width: 768px) {
            .header {
                height: auto;
                flex-wrap: wrap;
                padding: 10px;
                gap: 8px;
                justify-content: center;
            }

            .header h1 {
                display: none;
                /* Hide title on mobile to save space */
            }

            /* Container dos botoes de acao (direita) */
            .header>div {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                justify-content: space-between;
                gap: 5px;
            }

            /* Date Picker e Selector ocupam largura total ou dividida */
            #datePicker,
            #camSelector {
                flex: 1;
                min-width: 120px;
                height: 35px;
                /* Touch target */
            }

            /* Ajustes nos botões Header */
            .header .btn {
                padding: 8px 12px;
                font-size: 0.9rem;
            }

            /* Controls Area */
            .controls {
                height: auto;
                min-height: 140px;
                display: flex;
                flex-direction: column;
            }

            .time-labels {
                height: auto;
                flex-direction: column;
                padding: 10px;
                gap: 10px;
                background: #1a1a1a;
            }

            #zoom-controls {
                width: 100%;
                justify-content: space-between;
                font-size: 0.9rem;
            }

            #zoomSlider {
                flex: 1;
                /* Slider estica */
                max-width: 150px;
                margin: 0 10px;
            }

            /* Timestamp em nova linha, centralizado e bonito */
            #timestamp-display {
                display: block;
                width: 100%;
                margin: 5px 0 0 0 !important;
                box-sizing: border-box;
                font-size: 1rem !important;
            }

            /* Magic Button menos intrusivo */
            #btnMagicAction {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px !important;
                font-size: 0.85rem !important;
                border-radius: 25px !important;
                opacity: 0.9;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <button class="btn" onclick="goBack()" style="margin-right:10px;">⬅ Voltar</button>
        <h1 id="page-title" style="text-transform:capitalize;">Câmera</h1>
        <div style="display:flex; align-items:center; gap:10px;">
            <!-- DATE FILTER -->
            <div style="display:flex; align-items:center; background:#333; padding:2px 8px; border-radius:4px;">
                <input type="date" id="datePicker"
                    style="background:transparent; border:none; color:white; font-family:inherit; cursor:pointer;"
                    onchange="handleDateFilter()">
            </div>

            <select id="camSelector" onchange="changeCam(this.value)"
                style="padding:5px; background:#333; color:white; border:none;">

            <button class="btn" style="background:#d32f2f;" onclick="goLive()">Ao Vivo</button>
            <button class="btn" style="background:#555;" onclick="shareVideo()" title="Compartilhar">🔗</button>
            <button class="btn" style="background:#1976D2;" onclick="forceReload()">🔄</button>

    <div class="viewport" style="position:relative; overflow:hidden;">
        <video id="player" controls autoplay style="width:100%; height:100%; object-fit:contain;"></video>
        <button id="btn-play-overlay"

            ▶
        </button>
        <div id="hud">Aguardando dados...</div>

        <!-- SNIPER OVERLAY (HIDDEN BY DEFAULT) -->
        <div id="sniperOverlay" style="
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,20,0,0.3);
            z-index: 5;
            align-items: center;
            justify-content: center;

        ">
            <!-- TARGET BOX -->
            <div id="targetBox" style="
                width: 250px;
                height: 250px;
                border: 2px solid #ff1744;
                box-shadow: 0 0 15px #ff1744, inset 0 0 10px #ff1744;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            ">
                <!-- CROSSHAIR -->
                <div style="position:absolute; width:100%; height:1px; background:rgba(255,23,68,0.5);"></div>
                <div style="position:absolute; height:100%; width:1px; background:rgba(255,23,68,0.5);"></div>

                <!-- CORNERS -->
                <div
                    style="position:absolute; top:-2px; left:-2px; width:20px; height:20px; border-top:4px solid #ff1744; border-left:4px solid #ff1744;">
                </div>
                <div
                    style="position:absolute; top:-2px; right:-2px; width:20px; height:20px; border-top:4px solid #ff1744; border-right:4px solid #ff1744;">
                </div>
                <div
                    style="position:absolute; bottom:-2px; left:-2px; width:20px; height:20px; border-bottom:4px solid #ff1744; border-left:4px solid #ff1744;">
                </div>
                <div
                    style="position:absolute; bottom:-2px; right:-2px; width:20px; height:20px; border-bottom:4px solid #ff1744; border-right:4px solid #ff1744;">
                </div>

                <div
                    style="margin-top:-180px; color:#ff1744; font-weight:bold; font-family:monospace; background:rgba(0,0,0,0.8); padding:2px 5px;">
                    TARGET LOCKED</div>
            </div>

            <div
                style="position:absolute; bottom:80px; color:white; text-align:center; text-shadow:0 1px 3px black; font-family:monospace;">
                Posicione o alvo dentro do quadrado<br>usando Zoom e Pan
            </div>
        </div>



        <!-- MAGIC LENS BUTTON -->
        <button id="btnMagicAction" onclick="openMagicLens()" style="
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #6200ea, #b388ff);
            border: 1px solid #fff;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(98, 0, 234, 0.7);
            font-weight: bold;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s;
        ">
            ✨ Melhorar Imagem
        </button>
    </div>

    <!-- ENHANCE MODAL -->
    <div id="enhanceModal" style="
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.95);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    ">
        <h2
            style="color:#b388ff; font-family:'Courier New', monospace; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">
            AI ENHANCEMENT PROTOCOL
        </h2>

        <div style="position:relative; width:90%; height:70%; border:2px solid #333; overflow:hidden; background:#000;">
            <img id="enhancePreview" style="
                width: 100%;
                height: 100%;
                object-fit: contain;
                filter: brightness(0.8) sepia(1) hue-rotate(240deg); /* Sci-fi Blue Tint initially */
                transition: filter 2s ease;
            ">

            <!-- SCAN LINE EFFECT -->
            <div id="scanLine" style="
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 5px;
                background: cyan;
                box-shadow: 0 0 10px cyan;
                opacity: 0;
                pointer-events: none;
            "></div>

            <div id="enhanceLoading" style="
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: cyan;
                font-family: 'Courier New', monospace;
                font-size: 1.5rem;
                display: none;
                text-align: center;
            ">
                ANALYZING PIXELS...
                <br>
                <span id="loadingPercent">0%</span>

        </div>

        <div style="margin-top:20px; display:flex; gap:15px;">
            <button class="btn" onclick="closeMagicLens()" style="background:#444;">Fechar</button>
            <button class="btn" id="btnProcessAI" onclick="processAI()" style="
                background: linear-gradient(90deg, #6200ea, #00e5ff);
                color: white;
                font-weight: bold;
                padding: 10px 25px;
            ">⚡ INICIAR MELHORIA</button>
            <button class="btn" id="btnShareAI" onclick="shareEnhanced()" style="display:none; background:#00c853;">📤
                Compartilhar</button>
        </div>
    </div>

    <div class="controls">
        <div class="time-labels" style="display:flex; justify-content:space-between; align-items:center;">
            <div id="zoom-controls" style="display:flex; align-items:center; gap:10px;">
                <button onclick="prevSegment()" title="Arquivo Anterior" class="btn">⏮️</button>
                <button onclick="nextSegment()" title="Próximo Arquivo" class="btn">⏭️</button>

                <span style="color:#aaa; font-size:0.8rem; margin-left:15px;">Zoom:</span>
                <input type="range" id="zoomSlider" min="60" max="14400" step="60" value="1800"
                    oninput="updateZoom(this.value)" style="width:150px; cursor:pointer;">
            </div>

            <!-- Dynamic Timestamp Display (Moved out for better responsive layout) -->
            <span id="timestamp-display" style="
                font-family:'Consolas', monospace; 
                font-size:1.1rem; 
                color:#4CAF50; 
                border:1px solid #444; 
                padding:2px 8px; 
                background:#000;
                min-width: 180px;
                text-align:center;
            ">--/--/---- --:--:--</span>
            <!-- Labels ocultos conforme pedido anterior -->
            <span id="lbl-start" style="display:none"></span>
            <span id="lbl-center" style="display:none"></span>
            <span id="lbl-end" style="display:none"></span>
        </div>
        <div class="timeline-container" id="timeline-box">
            <canvas id="timeline"></canvas>
            <div id="cursor"
                style="position:absolute; top:0; bottom:0; width:1px; background:white; left:50%; pointer-events:none;">
            </div>
        </div>
    </div>

    <script>
        // Config
        // API_URL moved to Global Config below
        const urlParams = new URLSearchParams(window.location.search);
        let CAMERA = urlParams.get('camera') || 'piscina';
        let CROP = parseInt(urlParams.get('crop')) || 0;

        // Update Title immediately
        document.getElementById('page-title').innerText = "Câmera: " + CAMERA.charAt(0).toUpperCase() + CAMERA.slice(1);

        // FIXED: Variáveis globais faltantes
        let lastPlayTime = 0;
        let freezeCounter = 0;

        // Zoom Logic (Timeline)
        function updateZoom(val) {
            setZoom(parseInt(val));
        }

        // --- DIGITAL ZOOM (PINCH / WHEEL) ---
        let dZoom = 1.0;
        let dTransX = 0, dTransY = 0;
        let isPinching = false;
        let startDist = 0;
        let startPinchCenter = { x: 0, y: 0 };
        let startZoomState = { scale: 1, x: 0, y: 0 };

        const vidContainer = document.querySelector('.viewport');
        const vEl = document.getElementById('player');

        // Mouse Wheel Zoom
        vidContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 0.1;
            // Wheel zooms to center, or we could try to zoom to cursor if we had consistent coords
            applyDigitalZoom(dZoom + delta, dTransX, dTransY);
        });

        // --- PANNING VARIABLES ---
        let isPanning = false;
        let startPanX = 0, startPanY = 0;
        let startTransX = 0, startTransY = 0;

        // Touch Logic (Combined Zoom & Pan)
        vidContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                // PINCH START
                isPinching = true;
                isPanning = false; // Disable pan if pinching
                startDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                startZoomState = { scale: dZoom, x: dTransX, y: dTransY };
            } else if (e.touches.length === 1 && dZoom > 1.0) {
                // PAN START (Only if zoomed in)
                isPanning = true;
                isPinching = false;
                startPanX = e.touches[0].clientX;
                startPanY = e.touches[0].clientY;
                startTransX = dTransX;
                startTransY = dTransY;
            }
        }, { passive: false });

        vidContainer.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevent scrolling

            if (isPinching && e.touches.length === 2) {
                // PINCH MOVE
                const newDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scaleFactor = newDist / startDist;
                const newScale = startZoomState.scale * scaleFactor;
                applyDigitalZoom(newScale, dTransX, dTransY);
            } else if (isPanning && e.touches.length === 1) {
                // PAN MOVE
                const dx = e.touches[0].clientX - startPanX;
                const dy = e.touches[0].clientY - startPanY;
                applyDigitalZoom(dZoom, startTransX + dx, startTransY + dy);
            }
        }, { passive: false });

        vidContainer.addEventListener('touchend', (e) => {
            // Reset flags if no fingers left
            if (e.touches.length === 0) {
                isPinching = false;
                isPanning = false;
            }
        });

        // Double Tap / Double Click to Reset
        let lastTap = 0;
        vidContainer.addEventListener('touchend', (e) => {
            if (e.pointerType === 'mouse') return; // Handled by dblclick
            const now = Date.now();
            if (now - lastTap < 300) {
                applyDigitalZoom(1.0, 0, 0); // Reset
            }
            lastTap = now;
        });

        // Mouse Panning (Optional support for Desktop Dragging)
        let isMousePanning = false;
        vidContainer.addEventListener('mousedown', (e) => {
            if (dZoom > 1.0) {
                e.preventDefault(); // Prevent default drag behavior
                isMousePanning = true;
                startPanX = e.clientX;
                startPanY = e.clientY;
                startTransX = dTransX;
                startTransY = dTransY;
                vidContainer.style.cursor = 'grab';
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!isMousePanning) return;
            const dx = e.clientX - startPanX;
            const dy = e.clientY - startPanY;
            applyDigitalZoom(dZoom, startTransX + dx, startTransY + dy);
        });
        window.addEventListener('mouseup', () => {
            isMousePanning = false;
            vidContainer.style.cursor = 'default';
        });


        function applyDigitalZoom(scale, x, y) {
            // Limits
            if (scale < 1) scale = 1;
            if (scale > 10) scale = 10; // Max 10x (User Request)

            dZoom = scale;

            // Pan Limits (Keep image within view roughly)
            // If scale is 1, x/y must be 0.
            if (dZoom === 1) {
                dTransX = 0;
                dTransY = 0;
            } else {
                // If Zoomed, allow Panning.
                // Simple limit: Don't let user pan image completely off screen.
                // Let's rely on visual feedback for now, unbounded but user can pull back.
                // Or implementing a box constraint based on container size is better UX but complex.
                // For now, free pan (Photoshop style) is acceptable.
                dTransX = x;
                dTransY = y;
            }

            // Apply Transform
            vEl.style.transform = `scale(${dZoom}) translate(${dTransX / dZoom}px, ${dTransY / dZoom}px)`;
            // Note on Translate:
            // CSS transform order: translate is applied AFTER scale if listed after, or we need to adjust logic.
            // transform: scale(2) translate(50px, 0) -> Scales up, then moves 50px ISOLATED coordinates?
            // Actually: transform: translate(X, Y) scale(Z) is usually safer for Pan/Zoom logic.

            // REFINED TRANSFORM LOGIC:
            // We want 'translate' to move the image visually in pixels.
            // If we use `matrix()`, it's precise.
            // Simple approach: `translate(${x}px, ${y}px) scale(${scale})`
            // This means we translate first, then scale. 
            // If we move 10px right, then scale 2x, visually it moves 20px? 
            // Let's stick to `translate(x, y) scale(z)` and adjust input X/Y to match screen pixels.

            vEl.style.transform = `translate(${dTransX}px, ${dTransY}px) scale(${dZoom})`;

            // Show Feedback
            if (dZoom > 1.05) hud.innerText = `Zoom: ${dZoom.toFixed(1)}x`;
            else hud.innerText = "";
        }

        // --- SHARE FEATURE ---
        async function shareVideo() {
            if (!video.src) return alert("Nenhum vídeo carregado.");

            const shareData = {
                title: 'Vídeo NVR - ' + CAMERA,
                text: `Vídeo da câmera ${CAMERA} em ${new Date(centerTime * 1000).toLocaleString()}`,
                url: video.src // This URL might be local-only
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Fallback: Clipboard
                    await navigator.clipboard.writeText(video.src);
                    alert("Link do vídeo copiado para a área de transferência!");
                }
            } catch (e) {
                console.error("Share error:", e);
                // alert("Erro ao compartilhar: " + e);
            }
        }

        // --- MAGIC LENS (AI ENHANCE - SNIPER MODE) ---
        let capturedBlob = null;
        let enhancedBlob = null;

        // 1. Toggle Sniper Mode
        function openMagicLens() {
            const overlay = document.getElementById('sniperOverlay');
            const btn = document.getElementById('btnMagicAction');

            if (overlay.style.display === 'flex') {
                // V13: Pure Math + Split Camera Support (The "Success Absolute" version)
                captureSniperTargetV13();
            } else {
                // Enter Sniper Mode
                overlay.style.display = 'flex';
                btn.innerHTML = '📸 CAPTURAR ALVO';
                btn.style.background = 'linear-gradient(135deg, #d50000, #ff1744)';
            }
        }

        // POC: Simple Full Screen Print Test
        async function runPocPrint() {
            try {
                // 1. Get Stream with explicit self-capture permission
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { preferCurrentTab: true },
                    audio: false,
                    selfBrowserSurface: 'include',
                    systemAudio: 'exclude'
                });

                // 2. Video Element (Wait for it to actually play)
                const video = document.createElement('video');
                video.autoplay = true;
                video.srcObject = stream;

                await new Promise(r => video.onloadedmetadata = r);
                await video.play();
                await new Promise(r => setTimeout(r, 500)); // Buffer

                // 3. Capture Full Screen to Canvas
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // 4. Show Result (Raw Overlay)
                const imgData = canvas.toDataURL('image/png');

                const overlay = document.createElement('div');
                Object.assign(overlay.style, {
                    position: 'fixed', top: '0', left: '0', width: '100vw', height: '100vh',
                    zIndex: '100000', background: 'rgba(0,0,0,0.95)',
                    display: 'flex', flexDirection: 'column',
                    alignItems: 'center', justifyContent: 'center'
                });

                const img = document.createElement('img');
                img.src = imgData;
                Object.assign(img.style, {
                    maxWidth: '90%', maxHeight: '80%', border: '2px solid white', marginBottom: '20px'
                });

                const closeBtn = document.createElement('button');
                closeBtn.innerText = "FECHAR POC (SUCESSO)";
                Object.assign(closeBtn.style, {
                    fontSize: "20px", padding: "10px 30px", background: "white", border: "none", cursor: "pointer"
                });
                closeBtn.onclick = () => {
                    document.body.removeChild(overlay);
                    stream.getTracks().forEach(t => t.stop());
                };

                overlay.appendChild(img);
                overlay.appendChild(closeBtn);
                document.body.appendChild(overlay);

            } catch (e) {
                alert("POC Falhou: " + e.message);
            }
        }

        // 2. Capture Logic (V8 - VISUAL DEBUG MODE)
        async function captureSniperTarget() {
            const targetBox = document.getElementById('targetBox');
            const btn = document.getElementById('btnMagicAction');

            btn.innerText = "⚠️ Selecione a aba 'NVR Timeline'!";
            btn.style.background = "#ff9800";

            let stream = null;
            let videoElem = null;

            try {
                // 1. Request Capture
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: 'browser',
                        preferCurrentTab: true,
                    },
                    audio: false,
                    // CRITICAL: Allows the current tab to appear in the list
                    selfBrowserSurface: 'include',
                    systemAudio: 'exclude',
                    surfaceSwitching: 'include',
                    monitorTypeSurfaces: 'include'
                });

                // 2. Setup Video - VISIBLE FOR DEBUGGING
                videoElem = document.createElement('video');
                videoElem.style.position = 'fixed';
                videoElem.style.bottom = '10px';
                videoElem.style.right = '10px';
                videoElem.style.width = '320px'; // Mini preview
                videoElem.style.height = '180px';
                videoElem.style.border = '4px solid red';
                videoElem.style.zIndex = '99999';
                videoElem.style.background = '#000';
                videoElem.autoplay = true;
                videoElem.muted = true;
                videoElem.srcObject = stream;

                document.body.appendChild(videoElem);

                // 3. Wait for Stream to be valid
                await new Promise((resolve, reject) => {
                    let attempts = 0;
                    const check = setInterval(() => {
                        attempts++;
                        if (videoElem.videoWidth > 0 && videoElem.readyState >= 2) {
                            clearInterval(check);
                            resolve();
                        }
                        if (attempts > 40) { // 4 seconds
                            clearInterval(check);
                            reject(new Error("Stream de vídeo não iniciou (Tela Preta?)."));
                        }
                    }, 100);
                    videoElem.play().catch(e => console.log("Autoplay blocked?", e));
                });

                // Allow a moment for the user to see the debug window and for frames to settle
                await new Promise(r => setTimeout(r, 500));

                // 4. Debug Metrics
                const capW = videoElem.videoWidth;
                const capH = videoElem.videoHeight;

        // State
        let segments = [];

        // ... [Resize / FetchData kept same] ...

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startVisible = centerTime - (viewWindow / 2);
            const endVisible = centerTime + (viewWindow / 2);
            const pxPerSec = canvas.width / viewWindow;

            // Dynamic Grid Interval based on Zoom
            let interval = 300; // default 5 min
            if (viewWindow >= 3600) interval = 900; // 15 min for 1h+ view
            if (viewWindow <= 1800) interval = 300; // 5 min for 30m view
            if (viewWindow <= 600) interval = 60;   // 1 min for 10m view
            if (viewWindow <= 60) interval = 10;    // 10 sec for 1m view

            const firstMark = Math.floor(startVisible / interval) * interval;

            ctx.fillStyle = '#666';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;

            for (let t = firstMark; t < endVisible; t += interval) {
                const x = (t - startVisible) * pxPerSec;

                // Vertical Line
                ctx.beginPath();
                ctx.moveTo(x, 15);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                // Label (HH:MM:SS if zoom is deep, else HH:MM)
                const date = new Date(t * 1000);
                let label = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (viewWindow <= 60) {
                    label = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                }
                ctx.fillText(label, x, 10);
            }

            // Draw Segments
            segments.forEach(seg => {
                if (seg.end < startVisible || seg.start > endVisible) return;
                const x = (seg.start - startVisible) * pxPerSec;
                const w = Math.max((seg.end - seg.start) * pxPerSec, 2);

                ctx.fillStyle = (seg.type === 'motion') ? '#c62828' : '#2e7d32';
                ctx.fillRect(x, 20, w, canvas.height - 40);
            });

            // Center Line (Cursor)
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        const container = document.getElementById('timeline-box');

        // Init
        resize();
        window.addEventListener('resize', resize);

        // Mouse Drag Logic

        window.addEventListener('mouseup', () => {

                isDragging = false;
                seekTo(centerTime, false); // Stay paused after seek
            }
        });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            e.preventDefault(); // Prevent text selection
            const dx = e.clientX - lastX;
            lastX = e.clientX;
            processDrag(dx);
        });

        // TOUCH EVENTS (MOBILE FIX)
        container.addEventListener('touchstart', e => {
            if (e.touches.length > 0) {
                isDragging = true;
                lastX = e.touches[0].clientX;

        }, { passive: false }); // Needs passive:false to allow preventDefault later if needed

        window.addEventListener('touchend', () => {
            if (isDragging) {
                isDragging = false;
                seekTo(centerTime, false);

        });

        window.addEventListener('touchmove', e => {
            if (!isDragging) return;
            // Prevent scrolling page while dragging timeline
            if (e.target.closest('.timeline-container')) {
                e.preventDefault();
            }
            if (e.touches.length > 0) {
                const clientX = e.touches[0].clientX;
                const dx = clientX - lastX;
                lastX = clientX;
                processDrag(dx);
            }
        }, { passive: false });

        function processDrag(dx) {
            // Pixels to Seconds
            const pxPerSec = canvas.width / viewWindow;
            const dt = -dx / pxPerSec;

            centerTime += dt;
            draw();
        }

        container.addEventListener('dblclick', e => {

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;

            const clickTime = startVisible + (pct * viewWindow);

        async function fetchData(customStart, customEnd) {
            // Load last 24h by default, or use custom range
            let start, end;

            if (customStart && customEnd) {
                start = customStart;
                end = customEnd;
            } else {
                const now = Math.floor(Date.now() / 1000);
                start = now - 86400; // Last 24h
                end = now;
            }

            console.log(`[API] Fetching timeline: ${new Date(start * 1000).toLocaleString()} -> ${new Date(end * 1000).toLocaleString()}`);
            centerTime = (start + end) / 2; // Auto-center if not set? No, keep focus.
            // If custom range (Date Filter), center was already set by handleDateFilter.

            try {
                // Determine API base - Relative or Absolute
                // If running on 5000 (Proxy), use relative /api/nvr/timeline
                // If running on 5002 (Test), use relative /api/nvr/timeline (served by flask on root?)
                // Actually nvr_api_new.py serves /api/nvr/timeline.
                // vms_proxy.py proxies /api/nvr/* -> nvr_api_new:5002/api/nvr/*
                // So relative path works for BOTH!
                const apiPath = '/api/nvr/timeline';

                const res = await fetch(`${apiPath}?camera=${CAMERA}&start=${start}&end=${end}`);
                if (!res.ok) throw new Error("API Status: " + res.status);

                segments = await res.json();
                console.log(`Loaded ${segments.length} segments.`);
                draw();

                // If loading default (auto-load), jump to NOW or end of today. 
                // If filtering, stay on centerTime (noon).
                if (!customStart) {
                    // FORCE DEFAULT TO NOW (Users Request #2)
                    const now = Math.floor(Date.now() / 1000);
                    centerTime = now;
                    draw();
                } else if (customStart) {
                    draw(); // Just redraw
                }
            } catch (e) {
                console.error(e);
                hud.innerText = `Erro API: ${e.message}`;
                hud.style.color = 'red';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startVisible = centerTime - (viewWindow / 2);
            const endVisible = centerTime + (viewWindow / 2);
            const pxPerSec = canvas.width / viewWindow;

            // Draw Grid (Every 30 min)
            const interval = 1800; // 30 min
            const firstMark = Math.floor(startVisible / interval) * interval;

            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;

            for (let t = firstMark; t < endVisible; t += interval) {
                const x = (t - startVisible) * pxPerSec;

                // Vertical Line
                ctx.beginPath();
                ctx.moveTo(x, 15);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                // Label (HH:MM)
                const date = new Date(t * 1000);
                const label = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                ctx.fillText(label, x, 10);
            }

            // Draw Segments
            segments.forEach(seg => {
                if (seg.end < startVisible || seg.start > endVisible) return;
                const x = (seg.start - startVisible) * pxPerSec;
                const w = Math.max((seg.end - seg.start) * pxPerSec, 2); // Min 2px width

                // Color
                ctx.fillStyle = '#2e7d32'; // Green
                if (seg.type === 'motion') ctx.fillStyle = '#c62828'; // Red

                // Draw Bar (Mid-height)
                ctx.fillRect(x, 20, w, canvas.height - 40);
            });

            // Center Line (Cursor)
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;

            // 1. Update Text Display
            const tsEl = document.getElementById('timestamp-display');
            if (tsEl) {
                // Format: DD/MM/YYYY HH:MM:SS
                const day = String(centerDate.getDate()).padStart(2, '0');

            if (dateInput) {
                // Using local time YYYY-MM-DD
                const yyyy = centerDate.getFullYear();

                const dd = String(centerDate.getDate()).padStart(2, '0');

        // === DATE FILTER LOGIC ===

        const dateInput = document.getElementById('datePicker');

        function handleDateFilter() {
            // Reload data for the selected day (00:00 to 23:59)
            // Local Time midnight
            if (!dateInput.value) return;

            const selected = new Date(dateInput.value + 'T00:00:00');
            const startOfDay = selected.getTime() / 1000;
            const endOfDay = startOfDay + 86400;

            console.log("Date Filter Changed:", selected.toLocaleDateString(), startOfDay, endOfDay);

        // === SEEK & PLAYBACK LOGIC ===
        function seekTo(ts, autoPlay = true) {
            console.log("Seeking to:", ts, "AutoPlay:", autoPlay);
            centerTime = ts;
            draw(); // Move cursor

            // Seek Logic Start
            // Find segment that CONTAINS this timestamp
            const seg = segments.find(s => ts >= s.start && s.end >= ts);

            if (seg) {
                const offset = ts - seg.start;
                // Use src_camera (physical folder) if available, else camera (logical)
                const folder = seg.src_camera || seg.camera || CAMERA;
                const src = `${API_URL}/video/${folder}/${seg.filename}`;

                // Smart Seek Check
                const currentUrl = video.src.split('#')[0]; // Remove existing hash
                const targetUrl = src;

                // Compare relative paths or endsWith to avoid full URL mismatch
                if (currentUrl.endsWith(seg.filename) && !Number.isNaN(video.duration) && !video.error) {
                    // SAME video file. Just seek within it.
                    console.log(`[Smart Seek] Moving currentTime to ${offset}`);
                    if (Math.abs(video.currentTime - offset) > 1) {
                        video.currentTime = offset;
                    }
                    if (autoPlay) {
                        video.play().catch(e => console.error("Play error:", e));
                    }
                } else {
                    // NEW video file. Load it.
                    console.log(`[Player] Loading new src: ${src}#t=${offset}`);
                    currentFileStart = seg.start;

                    hud.innerText = `Carregando arquivo...`;
                    hud.style.color = 'yellow';

                    video.src = `${src}#t=${offset}`;
                    video.load(); // Force internal reset

                    if (autoPlay) {
                        const playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(e => {
                                console.error("Playback Error:", e);
                                if (e.name === 'NotAllowedError') {
                                    hud.innerText = "🔇 Toque para iniciar Áudio/Vídeo";
                                } else {
                                    hud.innerText = `Erro: ${e.name}`;
                                    // Let the error listener handle corrupt files
                                }
                            });
                        }
                    }
                }
            } else {
                // No video at this timestamp (Gap)
                hud.innerText = `Sem gravação em: ${new Date(ts * 1000).toLocaleTimeString()}`;
                hud.style.color = 'gray';

                // If we were playing, should we auto-skip gap?
                // Let's look ahead for the next segment
                if (autoPlay) {
                    const nextSeg = segments.find(s => s.start > ts);
                    if (nextSeg && (nextSeg.start - ts) < 60) { // If gap is small (< 1 min), jump
                        console.log("Gap small, jumping to next...");
                        seekTo(nextSeg.start, true);
                    } else {
                        video.pause();
                        video.removeAttribute('src'); // Stop buffering
                    }
                }
            }
        }

        // ROBUST ERROR HANDLING (Fixes "Stuck" issues)
        video.addEventListener('error', (e) => {
            const err = video.error;
            let msg = "Erro desconhecido";
            if (err) {
                if (err.code === 3) msg = "Erro Decode";
                if (err.code === 4) msg = "Arquivo Inválido/Não Suportado";
            }
            console.error("Video Error Event:", err, msg);

            // AGGRESSIVE AUTO-SKIP
            hud.innerText = `⚠️ ${msg}. Pulando arquivo...`;
            hud.style.color = 'orange';

            // Find current segment index
            const idx = segments.findIndex(s => s.start === currentFileStart);

            if (idx !== -1 && idx < segments.length - 1) {
                const nextSeg = segments[idx + 1];
                console.warn(`[Auto-Skip] Jumping from Corrupt File (${currentFileStart}) -> Next (${nextSeg.start})`);

                // Add tiny delay to prevent CPU spin loop if all files are bad
                setTimeout(() => {
                    seekTo(nextSeg.start, true);
                }, 1000);
            } else {
                hud.innerText = "❌ Fim da linha (Erro no último arquivo)";
                hud.style.color = 'red';

        function nextSegment() {
            hud.innerText = "⏭️ Buscando próximo...";

            const next = segments.find(s => s.start > centerTime + 2); // 2s tolerance
            if (next) {

        }

        function prevSegment() {
            hud.innerText = "⏮️ Buscando anterior...";
            // Find last segment ending BEFORE current view position
            const prev = segments.slice().reverse().find(s => s.end < centerTime - 2);
            if (prev) {
                seekTo(prev.start, true);
            } else {
                hud.innerText = "Inicio da lista.";
            }
        }

        let playbackWatchdog = null;
        video.addEventListener('waiting', () => {
            console.log("Video Buffering/Stalled...");
            if (playbackWatchdog) clearTimeout(playbackWatchdog);
            playbackWatchdog = setTimeout(() => {
                console.warn("Watchdog: Video stuck for 5s. Skipping...");
                nextSegment();
            }, 5000);
        });
        video.addEventListener('playing', () => {
            if (playbackWatchdog) clearTimeout(playbackWatchdog);
            hud.innerText = "Reproduzindo ✅";
            hud.style.color = '#4CAF50';
        });

        // Freeze Detector (Enhanced)
        setInterval(() => {
            // Check if playing but stuck
            const isPlaying = !video.paused && !video.ended;
            const isStuck = video.currentTime === lastPlayTime;
            const isBuffering = video.readyState < 3; // < HAVE_FUTURE_DATA

            if (isPlaying && (isStuck || isBuffering)) {
                freezeCounter++;
                // console.log(`[Freeze] Count: ${freezeCounter}, ReadyState: ${video.readyState}`);

                if (freezeCounter >= 3) { // Reduced to 3s
                    console.error("[Freeze Detector] STALL DETECTED. SKIPPING.");
                    hud.innerText = "❄️ Stall Detectado. Pulando...";
                    hud.style.color = 'cyan';
                    freezeCounter = 0;
                    nextSegment();
                }
            } else {
                freezeCounter = 0;
                lastPlayTime = video.currentTime;
            }
        }, 1000);

        // Sync Timeline with Video Playback & Auto-Next
        video.addEventListener('timeupdate', () => {
            if (isDragging || !currentFileStart) return;

            // 1. Update timeline center
            const nowTs = currentFileStart + video.currentTime;
            centerTime = nowTs;
            draw();

            // 2. Check for End of Segment (Gapless Playback)
            // Find current segment object to know its end (Robust Epsilon match)
            const currentSeg = segments.find(s => Math.abs(s.start - currentFileStart) < 0.5);

            if (currentSeg && nowTs >= currentSeg.end - 0.5) { // 0.5s buffer before end
                // Find next segment
                const nextSeg = segments.find(s => s.start > currentSeg.start); // Sorted auto finder
                if (nextSeg && (nextSeg.start - currentSeg.end) < 5) { // Only if gap is small (<5s)
                    console.log("Auto-playing next segment...");
                    // Do not seek if we just seeked (debounce?)
                    // For now, trust seekTo
                    seekTo(nextSeg.start);
                }
            }
        });

        // Loop Detector (Time going backwards)
        let lastUpdateTs = 0;
        let loopCount = 0;
        video.addEventListener('timeupdate', () => {
            if (isDragging || video.paused) {
                lastUpdateTs = video.currentTime;
                return;
            }

            // High Sensitivity: 0.1s drop
            if (video.currentTime < lastUpdateTs - 0.1) {
                loopCount++;
                // console.warn(`[Loop] Backwards detect ${loopCount}`);

                if (loopCount > 3) { // 3 ticks of backward movement
                    hud.innerText = "🔄 Loop Micro detectado. Pulando...";
                    hud.style.color = 'magenta';
                    loopCount = 0;
                    nextSegment();
                }
            } else {
                if (video.currentTime > lastUpdateTs) loopCount = 0;
            }
            lastUpdateTs = video.currentTime;
        });

        // Fail-safe Ended Trigger
        video.addEventListener('ended', () => {
            console.log("[Video] Ended event fired. Calling nextSegment.");
            nextSegment();
        });

        function goLive() {
            // Just jump to end
            centerTime = Math.floor(Date.now() / 1000);
            fetchData();
        }

        // 3. Capture Logic (V10 - Optical Auto-Calibrate)
        async function captureSniperTargetV10() {
            const targetBox = document.getElementById('targetBox');
            const btn = document.getElementById('btnMagicAction');
            const overlay = document.getElementById('sniperOverlay');

            btn.innerText = "⏳ Scan...";

            let stream = null;

            try {
                // 1. Prepare Target for Optical Scan
                // Make the border Pure Green (#00FF00) and thick
                const originalBorder = targetBox.style.border;
                const originalShadow = targetBox.style.boxShadow;

                targetBox.style.boxShadow = "none";
                targetBox.style.border = "6px solid #00FF00";

                // Allow render frame
                await new Promise(r => requestAnimationFrame(() => setTimeout(r, 100)));

                // 2. Get Stream (Current Tab)
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { preferCurrentTab: true },
                    audio: false,
                    selfBrowserSurface: 'include',
                    systemAudio: 'exclude'
                });

                // 3. Capture Frame
                const video = document.createElement('video');
                video.autoplay = true;
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                await video.play();
                await new Promise(r => setTimeout(r, 300)); // Short buffer

                const capW = video.videoWidth;
                const capH = video.videoHeight;

                // 4. Scan Pixels
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = capW;
                fullCanvas.height = capH;
                const fullCtx = fullCanvas.getContext('2d');
                fullCtx.drawImage(video, 0, 0);

                const frame = fullCtx.getImageData(0, 0, capW, capH);
                const data = frame.data;
                let minX = capW, minY = capH, maxX = 0, maxY = 0;
                let found = false;

                // Scan (Step 4 for speed)
                for (let y = 0; y < capH; y += 4) {
                    for (let x = 0; x < capW; x += 4) {
                        const i = (y * capW + x) * 4;
                        // Green Detector: G > 200, R < 100, B < 100
                        if (data[i + 1] > 200 && data[i] < 100 && data[i + 2] < 100) {
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                            found = true;
                        }
                    }
                }

                // 5. Restore UI (Hide Overlay)
                targetBox.style.border = originalBorder;
                targetBox.style.boxShadow = originalShadow;
                overlay.style.display = 'none';

                // 6. Determine Crop
                let cropX, cropY, cropW, cropH;
                if (found && (maxX - minX > 50)) {
                    // Crop Inside Border
                    const borderW = 6;
                    cropX = minX + borderW;
                    cropY = minY + borderW;
                    cropW = (maxX - minX) - (borderW * 2);
                    cropH = (maxY - minY) - (borderW * 2);
                    console.log(`[V10] Auto-Calibrated: ${cropX},${cropY} ${cropW}x${cropH}`);
                } else {
                    // Fallback
                    console.warn("[V10] Green Box not found. Using fallback.");
                    const winW = window.innerWidth;
                    const winH = window.innerHeight;
                    const scaleX = capW / winW;
                    const scaleY = capH / winH;
                    const rect = targetBox.getBoundingClientRect();
                    cropX = rect.left * scaleX;
                    cropY = rect.top * scaleY;
                    cropW = rect.width * scaleX;
                    cropH = rect.height * scaleY;
                }

                // 7. Draw Final
                const canvas = document.createElement('canvas');
                canvas.width = cropW;
                canvas.height = cropH;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

                // 8. Show
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const preview = document.getElementById('enhancePreview');
                preview.src = dataUrl;
                preview.style.filter = 'none';

                document.getElementById('enhanceModal').style.display = 'flex';
                document.getElementById('btnProcessAI').style.display = 'inline-block';
                document.getElementById('btnShareAI').style.display = 'none';
                document.getElementById('scanLine').style.opacity = '0';
                document.getElementById('enhanceLoading').style.display = 'none';

                btn.innerText = '✨ Melhorar Imagem';
                btn.style.background = 'linear-gradient(135deg, #6200ea, #b388ff)';

            } catch (e) {
                console.error(e);
                alert("Erro V10: " + e.message);
            } finally {
                if (stream) stream.getTracks().forEach(t => t.stop());
            }
        }

        // Auto load
        // 3. Capture Logic (V11 - Region Capture API)
        async function captureSniperTargetV11() {
            const targetBox = document.getElementById('targetBox');
            const btn = document.getElementById('btnMagicAction');
            const overlay = document.getElementById('sniperOverlay');

            btn.innerText = "⏳ Calibrando...";

            let stream = null;
            let cropTarget = null;
            let useRegionCapture = false;

            try {
                // Determine Strategy
                useRegionCapture = ('CropTarget' in window) && (typeof CropTarget.fromElement === 'function');
                console.log("[V11] Strategy:", useRegionCapture ? "Region Capture API" : "Pixel Scan Fallback");

                const originalBorder = targetBox.style.border;
                const originalShadow = targetBox.style.boxShadow;
                targetBox.style.boxShadow = "none";

                if (useRegionCapture) {
                    targetBox.style.border = "none"; // Clean box
                    cropTarget = await CropTarget.fromElement(targetBox);
                } else {
                    targetBox.style.border = "6px solid #00FF00";
                }

                // Force layout update
                await new Promise(r => requestAnimationFrame(() => setTimeout(r, 200)));

                // 2. Start Capture
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { preferCurrentTab: true },
                    audio: false,
                    selfBrowserSurface: 'include',
                    systemAudio: 'exclude'
                });

                const track = stream.getVideoTracks()[0];

                // 3. Apply Crop (If Native)
                if (useRegionCapture && cropTarget) {
                    try {
                        await track.cropTo(cropTarget);
                        console.log("[V11] Native Crop Applied.");
                    } catch (err) {
                        console.warn("Region Capture Failed (Wrong Tab?):", err);
                        useRegionCapture = false; // Trigger fallback logic
                        // Emergency Border Repaint for Fallback
                        targetBox.style.border = "6px solid #00FF00";
                        await new Promise(r => setTimeout(r, 250)); // Wait for repaint in stream
                    }
                }

                // 4. Capture Frame
                const video = document.createElement('video');
                video.autoplay = true;
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                await video.play();
                await new Promise(r => setTimeout(r, 400)); // Settle time

                const capW = video.videoWidth;
                const capH = video.videoHeight;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                let finalCropW = capW;
                let finalCropH = capH;

                if (useRegionCapture) {
                    // Already cropped natively
                    canvas.width = capW;
                    canvas.height = capH;
                    ctx.drawImage(video, 0, 0);
                } else {
                    // PIXEL SCAN FALLBACK
                    console.log("[V11] Executing Pixel Scan...");
                    const fullCanvas = document.createElement('canvas');
                    fullCanvas.width = capW;
                    fullCanvas.height = capH;
                    const fullCtx = fullCanvas.getContext('2d');
                    fullCtx.drawImage(video, 0, 0);
                    const data = fullCtx.getImageData(0, 0, capW, capH).data;

                    let minX = capW, minY = capH, maxX = 0, maxY = 0, found = false;
                    for (let y = 0; y < capH; y += 4) {
                        for (let x = 0; x < capW; x += 4) {
                            const i = (y * capW + x) * 4;
                            if (data[i + 1] > 200 && data[i] < 100 && data[i + 2] < 100) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                                found = true;
                            }
                        }
                    }

                    if (found && (maxX - minX > 20)) {
                        const bW = 6;
                        const cX = minX + bW;
                        const cY = minY + bW;
                        const cW = (maxX - minX) - (bW * 2);
                        const cH = (maxY - minY) - (bW * 2);
                        canvas.width = cW;
                        canvas.height = cH;
                        ctx.drawImage(video, cX, cY, cW, cH, 0, 0, cW, cH);
                        finalCropW = cW; finalCropH = cH;
                    } else {
                        // Total Failure
                        alert("Falha na Captura Precisa. Por favor, selecione 'Esta Guia' ao compartilhar.");
                        canvas.width = capW;
                        canvas.height = capH;
                        ctx.drawImage(video, 0, 0);
                    }
                }

                // 5. Cleanup UI
                targetBox.style.border = originalBorder;
                targetBox.style.boxShadow = originalShadow;
                overlay.style.display = 'none';

                // 6. Show Result
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const preview = document.getElementById('enhancePreview');
                preview.src = dataUrl;
                preview.style.filter = 'none';

                document.getElementById('enhanceModal').style.display = 'flex';
                document.getElementById('btnProcessAI').style.display = 'inline-block';
                document.getElementById('btnShareAI').style.display = 'none';
                document.getElementById('scanLine').style.opacity = '0';
                document.getElementById('enhanceLoading').style.display = 'none';

                btn.innerText = '✨ Melhorar Imagem';
                btn.style.background = 'linear-gradient(135deg, #6200ea, #b388ff)';

            } catch (e) {
                console.error(e);
                alert("Erro Capture: " + e.message);
                targetBox.style.border = "2px dashed red";
            } finally {
                if (stream) stream.getTracks().forEach(t => t.stop());
            }
        }

        // 4. Capture Logic (V12 - Pure Math Canvas - No Stream)
        // Recommended by User for 100% Precision
        function captureSniperTargetV12() {
            const videoElement = document.getElementById('player');
            const overlayElement = document.getElementById('targetBox');

            // Check globals
            const zoomAtual = (typeof dZoom !== 'undefined') ? dZoom : 1;

            // 1. Real Video Dimensions (e.g. 1920x1080)
            const vW = videoElement.videoWidth;
            const vH = videoElement.videoHeight;

            // 2. Screen Dimensions (CSS Rendered)
            const rectVideo = videoElement.getBoundingClientRect();
            const rectAlvo = overlayElement.getBoundingClientRect();

            console.log(`[V12 Logic] Real: ${vW}x${vH}, Rendered: ${rectVideo.width}x${rectVideo.height}, Zoom: ${zoomAtual}`);

            // 3. Relative Position Calc (Removing Zoom Factor)
            // (rectAlvo.left - rectVideo.left) is the visual distance in pixels ON SCREEN.
            // Dividing by zoomAtual reverses the CSS transform scale to get "base CSS pixels".
            const xRelativo = (rectAlvo.left - rectVideo.left) / zoomAtual;
            const yRelativo = (rectAlvo.top - rectVideo.top) / zoomAtual;

            // Dimensions also need to be un-zoomed
            const larguraRelativa = rectAlvo.width / zoomAtual;
            const alturaRelativa = rectAlvo.height / zoomAtual;

            // 4. Map to Real Video Pixels
            // Scale Factor = Real Pixels / Base CSS Pixels
            // Base CSS Pixels = Rendered Width / Zoom
            const cssBaseW = rectVideo.width / zoomAtual;
            const cssBaseH = rectVideo.height / zoomAtual;

            const scaleX = vW / cssBaseW;
            const scaleY = vH / cssBaseH;

            const sx = xRelativo * scaleX;
            const sy = yRelativo * scaleY;
            const sWidth = larguraRelativa * scaleX;
            const sHeight = alturaRelativa * scaleY;

            console.log(`[V12 Coords] SX:${sx} SY:${sy} W:${sWidth} H:${sHeight}`);

            // 5. Setup Canvas
            const canvas = document.createElement('canvas');
            canvas.width = sWidth;
            canvas.height = sHeight;
            const ctx = canvas.getContext('2d');

            try {
                // 6. The Secret: Draw directly from Video Element
                // sx, sy, sWidth, sHeight -> Source Rectangle (Video File)
                // 0, 0, sWidth, sHeight -> Destination (Canvas)
                ctx.drawImage(videoElement, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

                // Success Path
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const preview = document.getElementById('enhancePreview');
                preview.src = dataUrl;
                preview.style.filter = 'none';

                // UI Transitions
                document.getElementById('enhanceModal').style.display = 'flex';
                document.getElementById('btnProcessAI').style.display = 'inline-block';
                document.getElementById('btnShareAI').style.display = 'none';
                document.getElementById('scanLine').style.opacity = '0';
                document.getElementById('enhanceLoading').style.display = 'none';
                document.getElementById('sniperOverlay').style.display = 'none'; // Hide Target

                const btn = document.getElementById('btnMagicAction');
                btn.innerText = '✨ Melhorar Imagem';
                btn.style.background = 'linear-gradient(135deg, #6200ea, #b388ff)';

            } catch (e) {
                console.error("[V12] Error:", e);
                if (e.name === 'SecurityError') {
                    alert("Erro de Segurança (CORS): O vídeo não permite captura direta.\nCertifique-se que o servidor envia headers CORS corretos.");
                } else {
                    alert("Erro V12: " + e.message);
                }
            }
        }

        // 4. Capture Logic (V13 - Pure Math + CROP Correction + DUAL CONTEXT)
        // Handles Zoom AND Split-Screen Crops (e.g. 50% Bottom)
        function captureSniperTargetV13() {
            const videoElement = document.getElementById('player');
            const overlayElement = document.getElementById('targetBox');

            // Checks
            const zoomAtual = (typeof dZoom !== 'undefined') ? dZoom : 1;
            const activeCrop = (typeof CROP !== 'undefined') ? CROP : 0;

            // 1. Real Video Dimensions (Source File)
            const vW = videoElement.videoWidth;
            const vH = videoElement.videoHeight;

            // 2. Determine "Visible Source Height" based on Crop Mode
            let visibleSourceH = vH;
            let sourceOffsetY = 0;

            if (activeCrop === 1) { // Top 50%
                visibleSourceH = vH / 2;
                sourceOffsetY = 0;
            } else if (activeCrop === 2) { // Bottom 50%
                visibleSourceH = vH / 2;
                sourceOffsetY = vH / 2;
            } else if (activeCrop === 3) { // Top 33%
                visibleSourceH = vH / 3;
                sourceOffsetY = 0;
            } else if (activeCrop === 4) { // Mid 33%
                visibleSourceH = vH / 3;
                sourceOffsetY = vH / 3;
            } else if (activeCrop === 5) { // Bot 33%
                visibleSourceH = vH / 3;
                sourceOffsetY = (vH / 3) * 2;
            }

            // 3. Screen Dimensions (CSS Rendered)
            const rectVideo = videoElement.getBoundingClientRect();
            const rectAlvo = overlayElement.getBoundingClientRect();

            console.log(`[V13] Crop:${activeCrop} Real:${vW}x${vH} VisibleH:${visibleSourceH} OffY:${sourceOffsetY}`);

            // 4. Relative Position on Screen (Un-Zoomed)
            const xRelativo = (rectAlvo.left - rectVideo.left) / zoomAtual;
            const yRelativo = (rectAlvo.top - rectVideo.top) / zoomAtual;

            const larguraRelativa = rectAlvo.width / zoomAtual;
            const alturaRelativa = rectAlvo.height / zoomAtual;

            // 5. Map to Real Video Pixels
            const cssBaseW = rectVideo.width / zoomAtual;
            const cssBaseH = rectVideo.height / zoomAtual;

            const scaleX = vW / cssBaseW;
            const scaleY = visibleSourceH / cssBaseH;

            // Apply Scale and Add Offset
            const sx = (xRelativo * scaleX);
            const sy = (yRelativo * scaleY) + sourceOffsetY;
            const sWidth = larguraRelativa * scaleX;
            const sHeight = alturaRelativa * scaleY;

            console.log(`[V13 Coords] SX:${sx} SY:${sy} W:${sWidth} H:${sHeight}`);

            try {
                // --- A. CAPTURE CONTEXT (FULL FRAME from Video Source - Respecting Crop) ---
                // We capture only the VISIBLE part (e.g. Top 50%) as context, not the full hidden file.
                const canvasCtx = document.createElement('canvas');
                canvasCtx.width = vW;
                canvasCtx.height = visibleSourceH; // Fix: Height is the VISIBLE height
                const ctxContext = canvasCtx.getContext('2d');

                // Draw only the visible slice
                ctxContext.drawImage(videoElement,
                    0, sourceOffsetY, vW, visibleSourceH, // Source: X, Y, W, H (Crop)
                    0, 0, vW, visibleSourceH              // Dest: X, Y, W, H
                );
                const contextDataUrl = canvasCtx.toDataURL('image/jpeg', 0.85);

                // --- B. CAPTURE TARGET (CROP Pure Math) ---
                const canvasTarget = document.createElement('canvas');
                canvasTarget.width = sWidth;
                canvasTarget.height = sHeight;
                const ctxTarget = canvasTarget.getContext('2d');
                ctxTarget.drawImage(videoElement, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
                const targetDataUrl = canvasTarget.toDataURL('image/jpeg', 0.95);

                // --- UPDATE UI ---
                const preview = document.getElementById('enhancePreview');
                preview.dataset.context = contextDataUrl;
                preview.dataset.target = targetDataUrl;
                preview.src = targetDataUrl;
                preview.style.filter = 'none';

                // Helper Toggle UI
                let ctxLabel = document.getElementById('previewLabel');
                if (!ctxLabel) {
                    const container = preview.parentNode;
                    container.style.position = 'relative';

                    ctxLabel = document.createElement('div');
                    ctxLabel.id = 'previewLabel';
                    Object.assign(ctxLabel.style, {
                        position: 'absolute', bottom: '10px', left: '50%', transform: 'translateX(-50%)',
                        background: 'rgba(0,0,0,0.7)', color: '#fff', padding: '2px 8px', fontSize: '0.8rem', pointerEvents: 'none'
                    });
                    container.appendChild(ctxLabel);

                    const btnToggle = document.createElement('button');
                    btnToggle.innerText = "👁️ Ver Contexto";
                    btnToggle.id = 'btnToggleContext';
                    Object.assign(btnToggle.style, {
                        position: 'absolute', top: '10px', right: '10px', zIndex: '10',
                        padding: '5px 10px', background: '#333', color: 'white', border: '1px solid #555', cursor: 'pointer'
                    });
                    btnToggle.onclick = (e) => {
                        e.stopPropagation();
                        const img = document.getElementById('enhancePreview');
                        const lbl = document.getElementById('previewLabel');
                        if (img.src === img.dataset.target) {
                            img.src = img.dataset.context;
                            img.style.objectFit = 'contain';
                            lbl.innerText = "VISUALIZAÇÃO: CONTEXTO (CENA)";
                            btnToggle.innerText = "🎯 Ver Corte";
                        } else {
                            img.src = img.dataset.target;
                            img.style.objectFit = 'contain';
                            lbl.innerText = "VISUALIZAÇÃO: CORTE (ALVO)";
                            btnToggle.innerText = "👁️ Ver Contexto";
                        }
                    };
                    container.appendChild(btnToggle);
                } else {
                    document.getElementById('previewLabel').innerText = "VISUALIZAÇÃO: CORTE (ALVO)";
                    const t = document.getElementById('btnToggleContext');
                    if (t) t.innerText = "👁️ Ver Contexto";
                }

                document.getElementById('enhanceModal').style.display = 'flex';
                document.getElementById('btnProcessAI').style.display = 'inline-block';
                document.getElementById('btnShareAI').style.display = 'none';
                document.getElementById('scanLine').style.opacity = '0';
                document.getElementById('enhanceLoading').style.display = 'none';
                document.getElementById('sniperOverlay').style.display = 'none';

                const btn = document.getElementById('btnMagicAction');
                btn.innerText = '✨ Melhorar Imagem';
                btn.style.background = 'linear-gradient(135deg, #6200ea, #b388ff)';

            } catch (e) {
                console.error("[V13] Error:", e);
                if (e.name === 'SecurityError') {
                    alert("Erro CORS: Servidor de vídeo bloqueou acesso aos pixels.");
                } else {
                    alert("Erro V13: " + e.message);
                }
            }
        }

        // Auto load
        fetchData();

        // --- DUAL IMAGE AI OVERRIDES (Applied at Runtime) ---

        console.log("Applying AI Dual Image Patches...");

    </script>
