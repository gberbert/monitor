<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OS BERBERTS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --drawer: #252525;
            --text: #e0e0e0;
            --accent: #26a69a;
            /* Teal Sóbrio */
            --danger: #cf6679;
            --header-h: 60px;
            --drawer-w: 280px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .app-header {
            height: var(--header-h);
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            margin-right: 15px;
        }

        .app-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ddd;
            flex-grow: 1;
            letter-spacing: 1px;
        }

        /* --- DRAWER --- */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--drawer-w));
            width: var(--drawer-w);
            height: 100%;
            background: var(--drawer);
            z-index: 160;
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.5);
        }

        .drawer.open {
            transform: translateX(var(--drawer-w));
        }

        .drawer-header {
            height: 140px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: #444;
            color: #aaa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .drawer-content {
            flex: 1;
            padding: 10px 0;
            overflow-y: auto;
        }

        .menu-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            color: #ccc;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .menu-item.active {
            background: rgba(38, 166, 154, 0.1);
            border-left-color: var(--accent);
            color: var(--accent);
        }

        .menu-icon {
            margin-right: 15px;
            width: 20px;
            text-align: center;
            opacity: 0.7;
        }

        /* Custom Buttons inside Menu */
        .btn-access {
            background: #333;
            margin: 10px 20px;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            color: var(--accent);
            border: 1px solid #444;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-access:hover {
            background: #3a3a3a;
        }

        /* Badge for Pending Users */
        .badge {
            background: var(--danger);
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: auto;
        }

        /* --- CONTENT --- */
        .main-content {
            margin-top: var(--header-h);
            padding: 15px;
            min-height: calc(100vh - var(--header-h));
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .camera-card {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
        }

        .camera-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            padding: 8px 12px;
            box-sizing: border-box;
            font-size: 13px;
            color: #ddd;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal {
            background: var(--surface);
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .modal h3 {
            margin-top: 0;
            color: #fff;
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
        }

        .btn-confirm {
            background: var(--accent);
            color: white;
        }

        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .btn-approve {
            background: var(--accent);
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .camera-grid {
                grid-template-columns: 1fr;
            }

            .app-title {
                text-align: center;
                margin-right: 40px;
            }
        }
    </style>
</head>

<body>

    <header class="app-header">
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <div class="app-title">OS BERBERTS</div>
    </header>

    <!-- DRAWER -->
    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="user-avatar">👤</div>
            <div style="font-weight:600; color:#fff" id="user-display">Usuário</div>
            <div style="font-size:0.8rem; opacity:0.5">Gestão de Vídeo</div>
        </div>
        <div class="drawer-content">
            <a href="#" class="menu-item active" onclick="toggleDrawer()">
                <span class="menu-icon">📷</span> Monitoramento
            </a>

            <!-- Dynamic Button (Local/Online) -->
            <div id="btn-access-container"></div>

            <div class="menu-item" id="btn-install" style="display:none">
                <span class="menu-icon">📲</span> Instalar App
            </div>

            <hr style="border:0; border-top:1px solid #333; margin:10px 0">

            <!-- Admin Area -->
            <div id="admin-menu" style="display:none">
                <div class="menu-item" onclick="openApprovalModal()">
                    <span class="menu-icon">👥</span> Aprovar Logins
                    <span id="badge-pending" class="badge" style="display:none">0</span>
                </div>
            </div>

            <div class="menu-item" onclick="openPassModal()">
                <span class="menu-icon">🔒</span> Trocar Senha
            </div>

            <div class="menu-item" onclick="logout()">
                <span class="menu-icon">🚪</span> Sair
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        <div id="grid" class="camera-grid">
            <div style="text-align:center; padding:50px; opacity:0.6">Carregando...</div>
        </div>
    </div>

    <!-- MODAL: CHANGE PASSWORD -->
    <div id="modal-pass" class="modal-overlay">
        <div class="modal">
            <h3>Nova Senha</h3>
            <input type="password" id="new-pass" placeholder="Digite a nova senha">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModals()">Cancelar</button>
                <button class="btn-confirm" onclick="doChangePass()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: APPROVAL -->
    <div id="modal-approve" class="modal-overlay">
        <div class="modal">
            <h3>Aprovação Pendente</h3>
            <div id="pending-list" style="max-height: 200px; overflow-y: auto; margin-bottom:10px;">
                Carregando...
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModals()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // === AUTH & INIT ===
        const user = sessionStorage.getItem('vms_user');
        if (!sessionStorage.getItem('vms_auth')) window.location.href = 'index.html';
        document.getElementById('user-display').innerText = user || 'Usuário';

        // Admin Check
        if (user === 'admin') {
            document.getElementById('admin-menu').style.display = 'block';
            checkPendingUsers();
        }

        // === UI LOGIC: ONLINE vs LOCAL ===
        // Se hostname for localhost/IP, mostra botao Online.
        // Se hostname for .com, mostra botao Offline (Local).
        fetch('/api/info').then(r => r.json()).then(info => {
            const isLocal = ['localhost', '127.0.0.1'].some(h => window.location.hostname.includes(h)) || window.location.hostname.startsWith('192.168');

            const container = document.getElementById('btn-access-container');

            if (isLocal) {
                container.innerHTML = `
                    <a href="https://cams.osberberts.com" target="_blank" class="btn-access">
                        🌐 Acesso Online
                    </a>`;
            } else {
                // Offline access (Local)
                // Tenta usar o IP detectado pelo backend
                const localLink = info.local_url || 'http://localhost:5000';
                container.innerHTML = `
                    <a href="${localLink}" target="_blank" class="btn-access" style="border-color:#555; color:#aaa">
                        🏠 Acesso Local
                    </a>`;
            }
        });

        // === CORE LOGIC ===
        async function loadCameras() {
            try {
                const res = await fetch('/api/cameras');
                if (!res.ok) throw new Error("API Error");
                const cameras = await res.json();
                renderGrid(cameras);
            } catch (e) {
                document.getElementById('grid').innerHTML = '<div style="text-align:center; padding:20px">Erro de conexão.</div>';
            }
        }

        function renderGrid(cameras) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            if (!cameras || cameras.length === 0) {
                grid.innerHTML = '<div style="padding:20px; text-align:center">Nenhuma câmera.</div>'; return;
            }

            cameras.forEach(cam => {
                const isOnline = cam.is_online;
                const imgUrl = cam.snapshot_url;
                const streamKey = cam.stream_key;

                const div = document.createElement('div');
                div.className = 'camera-card';

                if (isOnline && streamKey) {
                    div.onclick = () => window.location.href = `player.html?src=${streamKey}`;
                    div.style.cursor = 'pointer';
                    div.style.animation = 'fadeIn 0.5s';
                } else {
                    div.style.opacity = '0.5';
                }

                let innerContent = '';
                if (isOnline) {
                    innerContent = `<img id="img-${streamKey || 'null'}" src="${imgUrl}" onerror="this.src='placeholder_error.png'">`;
                } else {
                    innerContent = `
                        <div style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#151515; color:#555;">
                            <div style="font-size:2rem; margin-bottom:5px">🔌</div>
                            <div style="font-weight:bold; font-size:0.9rem; letter-spacing:1px">OFFLINE</div>
                        </div>
                    `;
                }

                div.innerHTML = `
                    ${innerContent}
                    <div class="camera-title">
                        ${cam.name} 
                        <span style="float:right; color:${isOnline ? '#26a69a' : '#cf6679'}">●</span>
                    </div>
                `;
                grid.appendChild(div);

                if (isOnline && streamKey) startReload(streamKey, imgUrl);
            });
        }

        function startReload(streamKey, baseUrl) {
            const separator = baseUrl.includes('?') ? '&' : '?';
            setInterval(() => {
                const el = document.getElementById(`img-${streamKey}`);
                if (el) el.src = `${baseUrl}${separator}t=${Date.now()}`;
            }, 3500);
        }

        // === ADMIN FUNCTIONS ===
        async function checkPendingUsers() {
            const res = await fetch('/api/users/pending');
            const data = await res.json();
            if (data.length > 0) {
                const badge = document.getElementById('badge-pending');
                badge.innerText = data.length;
                badge.style.display = 'inline-block';
            }
        }

        async function openApprovalModal() {
            document.getElementById('modal-approve').style.display = 'flex';
            toggleDrawer(); // fecha menu
            const list = document.getElementById('pending-list');
            list.innerHTML = 'Carregando...';

            const res = await fetch('/api/users/pending');
            const users = await res.json();

            list.innerHTML = '';
            if (users.length === 0) list.innerHTML = '<div style="padding:10px; color:#777">Nenhum pendente.</div>';

            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-list-item';
                div.innerHTML = `
                    <span>${u}</span>
                    <button class="btn-approve" onclick="approveWorker('${u}')">Aprovar</button>
                `;
                list.appendChild(div);
            });
        }

        async function approveWorker(username) {
            await fetch('/api/users/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            openApprovalModal(); // reload
            checkPendingUsers(); // update badge
        }

        // === PASSWORD CHANGE ===
        function openPassModal() {
            document.getElementById('modal-pass').style.display = 'flex';
            toggleDrawer();
        }

        async function doChangePass() {
            const newp = document.getElementById('new-pass').value;
            if (!newp) return alert('Senha vazia');

            await fetch('/api/users/change_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, new_password: newp })
            });
            alert('Senha alterada!');
            closeModals();
        }

        // === UTILS ===
        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
        }
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Start
        loadCameras();

        // PWA Install
        let deferredPrompt;
        const btnInstall = document.getElementById('btn-install');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            btnInstall.style.display = 'flex';
        });
        btnInstall.addEventListener('click', () => {
            btnInstall.style.display = 'none'; deferredPrompt.prompt();
        });

    </script>
</body>

</html>
