<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - Antigravity VMS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            position: absolute;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: #333;
            padding: 8px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .hd-btn {
            background: #444;
            color: #aaa;
            border: 1px solid #555;
            transition: all 0.2s;
        }

        .hd-btn.active {
            background: #26a69a;
            color: white;
            border-color: #26a69a;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(38, 166, 154, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #status-log {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="dashboard.html" class="back-btn">⬅ Voltar</a>
        <div class="actions">
            <!-- HD Toggle Button -->
            <button id="btn-hd" onclick="toggleHD()" class="back-btn hd-btn">HD</button>
            <button onclick="document.getElementById('mjpeg-stream').requestFullscreen()" class="back-btn">⛶
                Full</button>
        </div>
    </div>

    <!-- MJPEG Player -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100%; background: #000;">
        <img id="mjpeg-stream" style="max-width: 100%; max-height: 100%; object-fit: contain;"
            alt="Carregando Video...">
    </div>

    <div id="status-log">Modo: Carregando...</div>

    <script>
        // Auth Check
        if (sessionStorage.getItem('vms_auth') !== 'true') {
            window.location.href = 'index.html';
        }

        const img = document.getElementById('mjpeg-stream');
        const statusLog = document.getElementById('status-log');
        const btnHd = document.getElementById('btn-hd');
        const urlParams = new URLSearchParams(window.location.search);

        // Base Stream Key (e.g., 'camera_mjpeg' or 'camera_hd')
        let currentKey = urlParams.get('src');
        let isHd = false;

        // Determine initial state
        if (currentKey && currentKey.endsWith('_hd')) {
            isHd = true;
            updateBtnState();
        }

        // Direct Connection Logic (Production Port 1984)
        // Hybrid Logic: Local -> Direct 1984 | Remote -> Proxy
        const isLocalIP = ['localhost', '127.0.0.1'].includes(window.location.hostname) || window.location.hostname.startsWith('192.168.');
        const BASE_HOST = isLocalIP ? `http://${window.location.hostname}:1984` : '';

        function updateBtnState() {
            if (isHd) {
                btnHd.innerText = "HD: ON";
                btnHd.classList.add('active');
            } else {
                btnHd.innerText = "HD: OFF";
                btnHd.classList.remove('active');
            }
        }

        function loadStream(key) {
            statusLog.innerText = `Conectando a: ${key}...`;

            // Force stop previous
            img.src = "";

            // Construct direct URL
            const streamUrl = `${BASE_HOST}/api/stream.mjpeg?src=${encodeURIComponent(key)}`;
            console.log("Player connecting to:", streamUrl);

            // Small timeout to ensure socket teardown
            setTimeout(() => {
                img.src = streamUrl;
            }, 50);

            // Update URL param without reload (for sharing/refresh)
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('src', key);
            window.history.pushState({}, '', newUrl);
        }

        function toggleHD() {
            if (!currentKey) return;

            // Logic:
            // SD Key: {name}_mjpeg
            // HD Key: {name}_hd

            let newKey = "";
            if (isHd) {
                // Switch to SD
                // Replace '_hd' with '_mjpeg'
                newKey = currentKey.replace('_hd', '_mjpeg');
                isHd = false;
            } else {
                // Switch to HD
                // Replace '_mjpeg' with '_hd'
                if (currentKey.endsWith('_mjpeg')) {
                    newKey = currentKey.replace('_mjpeg', '_hd');
                } else {
                    // Fallback append if naming scheme differs? 
                    // Assuming standard naming from sync_test.py
                    newKey = currentKey + "_hd";
                }
                isHd = true;
            }

            currentKey = newKey;
            updateBtnState();
            loadStream(newKey);
        }

        // Event Handlers
        img.onload = () => {
            statusLog.innerText = isHd ? "Status: ONLINE (HD 720p)" : "Status: ONLINE (SD 360p)";
            statusLog.style.color = "#0f0";
        };

        img.onerror = () => {
            console.warn("Stream load failed.");
            statusLog.innerText = "Falha no Stream (Tentando reconectar...)";
            statusLog.style.color = "orange";
            // Simple retry logic could go here
        };

        // Init
        setTimeout(() => {
            if (!currentKey) {
                statusLog.innerText = "Erro: Nenhuma câmera selecionada.";
                statusLog.style.color = "red";
            } else {
                loadStream(currentKey);
            }
        }, 500);

    </script>
</body>

</html>
